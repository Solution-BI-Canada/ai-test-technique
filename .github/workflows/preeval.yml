name: Pré-évaluation candidat

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preeval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Vérification de la structure de repo imposée par le sujet
  # ---------------------------------------------------------------------------
  repo-structure:
    name: Structure du repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier les fichiers obligatoires
        shell: bash
        run: |
          set +e
          missing=()
          required=(
            "README.md"
            "Dockerfile"
            "src/preprocessing.py"
            "src/training.py"
            "src/evaluation.py"
            "src/api.py"
            "tests"
          )
          for path in "${required[@]}"; do
            if [ ! -e "$path" ]; then
              missing+=("$path")
            fi
          done

          if [ ! -e "Makefile" ] && [ ! -e "run.sh" ]; then
            missing+=("Makefile|run.sh")
          fi

          if [ ! -e "requirements.txt" ] && [ ! -e "pyproject.toml" ]; then
            missing+=("requirements.txt|pyproject.toml")
          fi

          test_count=$(find tests -type f -name "test_*.py" 2>/dev/null | wc -l)

          {
            echo "## Structure du repo"
            echo
            if [ ${#missing[@]} -eq 0 ]; then
              echo "Tous les fichiers/dossiers obligatoires sont présents."
            else
              echo "**Fichiers/dossiers manquants :**"
              for m in "${missing[@]}"; do
                echo "- \`$m\`"
              done
            fi
            echo
            echo "Fichiers de tests détectés : **$test_count**"
            if [ "$test_count" -lt 2 ]; then
              echo
              echo "Le sujet demande au minimum 2 tests unitaires."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ${#missing[@]} -ne 0 ]; then
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 2. Qualité Python : install, lint (warning), tests
  # ---------------------------------------------------------------------------
  python-quality:
    name: Tests & lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Installer les dépendances
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" || pip install -e . || pip install .
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "Aucun gestionnaire de dépendances détecté."
            exit 1
          fi
          pip install pytest pytest-cov ruff

      - name: Lint (ruff, non bloquant)
        continue-on-error: true
        shell: bash
        run: |
          ruff check src tests --output-format=github | tee ruff-report.txt || true

      - name: Lancer la suite de tests
        shell: bash
        run: |
          set -o pipefail
          pytest tests \
            --maxfail=10 \
            --disable-warnings \
            --cov=src \
            --cov-report=term \
            --cov-report=xml \
            -v | tee pytest-report.txt

      - name: Récap dans le summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Tests & lint Python"
            echo
            if [ -f pytest-report.txt ]; then
              tail_line=$(tail -n 5 pytest-report.txt | head -n 1)
              echo "**Résumé pytest :** \`$tail_line\`"
            fi
            echo
            if [ -f coverage.xml ]; then
              cov=$(python - <<'PY'
          import xml.etree.ElementTree as ET
          try:
              root = ET.parse("coverage.xml").getroot()
              print(f"{float(root.attrib.get('line-rate', 0)) * 100:.1f}%")
          except Exception:
              print("n/a")
          PY
          )
              echo "**Couverture lignes :** $cov"
            fi
            echo
            if [ -f ruff-report.txt ]; then
              issues=$(wc -l < ruff-report.txt | tr -d ' ')
              echo "**Lignes de sortie ruff (non bloquant) :** $issues"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 3. Build Docker + smoke test sur /health (et best-effort sur /predict)
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: Build Docker & smoke test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        shell: bash
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "Dockerfile manquant — on saute le build."
            exit 1
          fi
          docker build -t stockout-api:test .

      - name: Démarrer le container
        id: run
        shell: bash
        run: |
          docker run -d --name stockout-api -p 8000:8000 stockout-api:test
          # Attente démarrage (max 60s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "API up après ${i} tentatives."
              echo "api_up=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo "L'endpoint /health n'a jamais répondu en 60s."
          docker logs stockout-api || true
          echo "api_up=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Smoke test /predict (best-effort)
        id: predict
        if: steps.run.outputs.api_up == 'true'
        continue-on-error: true
        shell: bash
        run: |
          payload='{
            "instances": [
              {
                "date": "2024-12-15",
                "sku_id": "SKU_001",
                "store_id": "STORE_1",
                "sales_qty": 25,
                "stock_level": 10,
                "promotion_flag": 0,
                "temperature": 5.0,
                "day_of_week": 6
              }
            ]
          }'
          response=$(curl -s -o predict-response.json -w "%{http_code}" \
            -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "000")
          echo "HTTP code: $response"
          cat predict-response.json || true
          echo "predict_http=$response" >> "$GITHUB_OUTPUT"

      - name: Logs du container
        if: always()
        shell: bash
        run: docker logs stockout-api 2>&1 | tail -n 100 || true

      - name: Stop & cleanup
        if: always()
        shell: bash
        run: |
          docker stop stockout-api >/dev/null 2>&1 || true
          docker rm stockout-api >/dev/null 2>&1 || true

      - name: Récap dans le summary
        if: always()
        env:
          API_UP: ${{ steps.run.outputs.api_up }}
          PREDICT_HTTP: ${{ steps.predict.outputs.predict_http }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          {
            echo "## Build Docker & API"
            echo
            echo "- Statut global du job : \`$JOB_STATUS\`"
            if [ "$API_UP" = "true" ]; then
              echo "- Démarrage du container et /health : OK"
              echo "- /predict (best-effort) : code HTTP \`${PREDICT_HTTP:-n/a}\`"
            else
              echo "- Démarrage du container et /health : KO"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 4. Récapitulatif global
  # ---------------------------------------------------------------------------
  summary:
    name: Récapitulatif
    runs-on: ubuntu-latest
    needs: [repo-structure, python-quality, docker-smoke]
    if: always()
    steps:
      - name: Écrire le récap final
        env:
          STRUCTURE_RESULT: ${{ needs.repo-structure.result }}
          PYTHON_RESULT: ${{ needs.python-quality.result }}
          DOCKER_RESULT: ${{ needs.docker-smoke.result }}
        shell: bash
        run: |
          {
            echo "# Pré-évaluation automatique"
            echo
            echo "Cette pré-évaluation est **purement informative**."
            echo "Elle objective une partie des critères de la grille (axes 2 et 3)."
            echo "L'évaluation finale tient aussi compte des axes humains (justifications, EDA, vision MLOps, qualité de la PR)."
            echo
            echo "| Étape | Statut |"
            echo "|---|---|"
            echo "| Structure du repo | $STRUCTURE_RESULT |"
            echo "| Tests & lint Python | $PYTHON_RESULT |"
            echo "| Build Docker & API | $DOCKER_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"
